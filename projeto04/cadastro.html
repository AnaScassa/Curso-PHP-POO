<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Conta</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="login-card">

            <div class="logo-area">
                <h1>💳 Caixa Eletrônico</h1>
                <p>Criar nova conta</p>
            </div>

            <form class="login-form" method="post">

                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="number" id="cpf" name="cpf" placeholder="Digite seu CPF" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirme a senha"
                        required>
                </div>

                <button class="login-button" type="submit" name="cadastrar">
                    Criar Conta
                </button>

            </form>

            <div class="register-area">
                <p>Já tem conta?</p>
                <a href="index.php">Fazer login</a>
            </div>

        </div>

    </div>

</body>

</html>
